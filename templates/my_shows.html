{% extends 'base.html' %}

{% block content %}
<h2>My Uploads</h2>

<div class="grid">
  {% for show in shows %}
    <div class="card" onclick="openModal('{{ show.id }}')">
        <img src="{{ show.image.url }}">
        <h4>{{ show.title }}</h4>
    </div>

    <div id="modal-{{ show.id }}" class="modal">
        <div class="modal-content">
            <h2>{{ show.title }}</h2>
            <p>{{ show.description }}</p>

            {% if show.watch_link %}
                <a href="{{ show.watch_link }}" target="_blank">
                    <button>Watch Now</button>
                </a>
            {% endif %}

            <div style="margin-top:15px;">
                <a href="{% url 'update_show' show.id %}">
                    <button>Edit</button>
                </a>

                <a href="{% url 'delete_show' show.id %}">
                    <button style="background:red; color:white;">
                        Delete
                    </button>
                </a>
            </div>

            <button onclick="closeModal('{{ show.id }}')">Close</button>
        </div>
    </div>

  {% empty %}
    <p>You have not uploaded anything yet.</p>
  {% endfor %}
</div>

{% endblock %}
