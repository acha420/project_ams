{% load static %}
<!DOCTYPE html>
<html>
    <style>
        /* Global layout */

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #ffffff;
    background: url('../images/background.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Navbar – fixed at top, content scrolls under it */

nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(31, 31, 31, 0.95);
    padding: 15px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(6px);
}

nav div:last-child {
    display: flex;
    align-items: center;
    gap: 12px;
}

nav a {
    color: #ffffff;
    text-decoration: none;
    margin-right: 15px;
    font-weight: 500;
}

nav a:hover {
    color: #00ffcc;
}

/* Avatar in navbar */

nav img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #00ffcc;
    cursor: pointer;
    transition: transform 0.2s;
}

nav img:hover {
    transform: scale(1.1);
}

/* Page container – top padding so content starts below fixed navbar */

.container {
    padding: 20px;
    padding-top: 75px;
    min-height: calc(100vh - 80px);
    padding-bottom: 40px;
    background: #000000;
}

.form-section {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    min-height: 60vh;
}

/* Rectangle form card */

.form-box {
    width: 380px;
    max-width: 90%;
    padding: 35px;
    background: rgba(31, 31, 31, 0.95);
    border: 1px solid rgba(0, 255, 204, 0.25);
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
}

.form-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

input,
textarea,
select {
    width: 100%;
    padding: 10px;
    margin-bottom: 14px;
    border-radius: 4px;
    border: 1px solid #333333;
    background: rgba(0, 0, 0, 0.5);
    color: #ffffff;
}

/* Buttons */

button {
    padding: 8px 15px;
    border: none;
    background: #042dc1;
    color: #ffffff;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
}

button:hover {
    background: #00ccaa;
}

/* Grid of shows */

/* Grid – exactly 5 cards per row */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
}

@media (max-width: 900px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 500px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Show cards – horizontal rectangle: width bigger than height */
.card {
    background: rgba(31, 31, 31, 0.9);
    padding: 0;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    overflow: hidden;
    aspect-ratio: 3 / 2;
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
}

.card img {
    width: 100%;
    height: 0;
    flex: 1;
    min-height: 0;
    object-fit: cover;
    border-radius: 5px 5px 0 0;
}

.card h4 {
    margin: 0;
    padding: 10px 12px;
    font-size: 0.95rem;
    line-height: 1.2;
    flex-shrink: 0;
}

/* Modal */

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background: rgba(0, 0, 0, 0.8);
}

.modal-content {
    background: #1f1f1f;
    width: fit-content;
    min-width: 320px;
    max-width: 90vw;
    max-height: 85vh;
    overflow-y: auto;
    margin: 5vh auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.8);
    animation: popup 0.25s ease;
}

@keyframes popup {
    from {
        transform: scale(0.85);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

/* Contact section */

/* Contact section – at end of page content, not fixed */
.contact-section {
    margin-top: 40px;
    padding: 16px 20px;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(6px);
}

.contact-section h3 {
    margin-top: 0;
}

.contact-section a {
    color: #00ffcc;
}

.contact-section p {
    margin: 6px 0;
}

/* Contact Us page */

.contact-page {
    max-width: 600px;
    padding: 24px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 10px;
}

.contact-page h2 {
    margin-top: 0;
}

.contact-page a {
    color: #00ffcc;
}

.contact-page p {
    margin: 10px 0;
}

/* Profile image preview */

#preview {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-top: 10px;
    border: 3px solid #18f5c9;
    box-shadow: 0 0 10px rgba(0,255,204,0.6);
}
    </style>

<head>
    <title>Fav Show Vault</title>
</head>

<body>

<nav>
    <div>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'contact' %}">Contact Us</a>
        {% if user.is_authenticated %}
            <a href="{% url 'upload' %}">Upload</a>
        {% endif %}
    </div>

    <div>
        {% if user.is_authenticated %}
           <a href="{% url 'my_shows' %}">
    <img src="{{ user.profile.image.url }}"
         style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
</a>
<a href="{% url 'profile_update' %}">Edit Profile</a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'signup' %}">Signup</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script>
    function openModal(id) {
        document.getElementById("modal-" + id).style.display = "block";
    }

    function closeModal(id) {
        document.getElementById("modal-" + id).style.display = "none";
    }
</script>

</body>
</html>
