<!DOCTYPE html>
<html>
<head>
    <title>Fav Show Vault</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #121212;
            color: white;
        }

        nav {
            background: #1f1f1f;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }

        nav a:hover {
            color: #00ffcc;
        }

        .container {
            padding: 20px;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #00ffcc;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1f1f1f;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-radius: 5px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(0,0,0,0.8);
        }

        .modal-content {
            background: #1f1f1f;
            width: 60%;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav>
    <div>
        <a href="{% url 'home' %}">Home</a>
        {% if user.is_authenticated %}
            <a href="{% url 'upload' %}">Upload</a>
        {% endif %}
    </div>

    <div>
        {% if user.is_authenticated %}
            <span>{{ user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'signup' %}">Signup</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script>
    function openModal(id) {
        document.getElementById("modal-" + id).style.display = "block";
    }

    function closeModal(id) {
        document.getElementById("modal-" + id).style.display = "none";
    }
</script>

</body>
</html>
